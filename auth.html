<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auth</title>
<style>
  body{font-family:system-ui,Arial;margin:0;background:#0b1220;color:#e6edf3}
  .wrap{max-width:720px;margin:0 auto;padding:16px}

/* 定義閃爍動畫 在 dialog 上套用 */
@keyframes blinkBorder {
  0%, 100% { box-shadow: 0 0 0px #ef4444; }
  50% { box-shadow: 0 0 16px #ef4444; } }
#manualDlg.blink {
  animation: blinkBorder 0.8s ease-in-out infinite;}

  #view{
    aspect-ratio:3/4;
    background:#111827;
    border-radius:30px;
    overflow:hidden}
  video{
    width:100%;
    height:100%;
    object-fit:cover}

  .hint{margin:12px 0;color:#93a4b7;font-size:14px}

  .bar{
    display:flex;gap:10px;
    justify-content:center;
    margin-top:24px}
  button{background:#2563eb;color:#fff;border:0;padding:10px 14px;border-radius:10px;cursor:pointer}
  button.secondary{background:#374151}
  dialog{border:none;border-radius:12px;padding:0;background:#0f172a;color:#e6edf3;max-width:560px;width:calc(100% - 32px)}
  .dlg-body{padding:16px}
  .dlg-title{font-weight:700;margin-bottom:8px}
  .fld{display:flex;flex-direction:column;gap:8px}
  .fld input{padding:12px 14px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:#e6edf3;font-family:monospace}
  .fld input:focus{border-color:#60a5fa;outline:none}
  .fld small{color:#94a3b8}
  .err{color:#ef4444;margin-top:6px;min-height:1.2em}
  .dlg-row{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}

  dialog#manualDlg {
    position: fixed;
    margin: 0;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
  }
/* ===== 強制輸入字體大小避免縮放 ===== */
input, select, textarea { font-size:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="status" class="hint">請允許相機權限以開始掃描 QR。</div>
  <div id="view-wrap">
    <div id="view"><video id="cam" autoplay playsinline muted></video></div>
  </div>
  <div class="bar">
    <button id="startBtn">開始掃描</button>
    <button id="stopBtn"  class="secondary">停止相機</button>
    <button id="manualBtn" class="secondary">輸入金鑰</button>
  </div>
</div>

<dialog id="manualDlg">
  <div class="dlg-body">
    <div class="dlg-title">輸入 128 位 QR 代碼</div>
    <div class="fld">
      <input id="manualInput" type="text" maxlength="128"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
             placeholder="輸入 128 字元金鑰">
      <small>只接受配對的固定 Key，大小寫須完全一致。</small>
      <div id="manualErr" class="err"></div>
    </div>
    <div class="dlg-row">
      <button id="manualCancel" class="secondary">取消</button>
      <button id="manualOk" type="button">確定</button>
    </div>
  </div>
</dialog>

<script type="module">
  import { QRScanner } from './js/QRScanner.js';

  const admin_URL_64 = "backup.html";
  const f_key64  = "L2q7v5pM9HsX1k3RdE8yCfJ4tU0aZ6nVgQwBhTmYcKoNrPiSjDlFxGuObWe";

  const admin_URL_128 = "admin.html";
  const f_key128  = "f58f84dfd91a46d68f130d4a2ca2a783eaf649fe96284ef09395571e030106aab70b6258691887e3d22ce185105a943ff88b8c7f536aae149ea23d2bd83ffe3f";
  const f_tokey = "c7b5e18a4f3d29b6d01c84a57de239f8146bc9e2fa518a7d3c0ef492a5bdc876";

QRScanner.mount({
  videoEl: "#cam",
  formats: ["qr"],
  mode: "stop-on-valid",
  isValid: (txt) => {
    const v = txt.trim();
    return v === f_key128 || v === f_key64;
  },
  blink: true,
  onOk: (txt) => {
    const v = (txt || '').trim();
    if (v === f_key128) {
      sessionStorage.setItem("ts", String(Date.now()));
      sessionStorage.setItem("tokey", f_tokey);
      location.replace(admin_URL_128);
    } else if (v === f_key64) {
      sessionStorage.setItem("ts", String(Date.now()));
      sessionStorage.setItem("tokey", f_tokey);
      location.replace(admin_URL_64);
    }
  },
  onError: (err) => console.log("QR err:", err)
});
  document.getElementById('startBtn')?.addEventListener('click', () => QRScanner.start());
  document.getElementById('stopBtn') ?.addEventListener('click', () => QRScanner.stop());
// --- Auto start camera once after first render ---
let _autoStarted = false;
const autoStartOnce = () => {
  if (_autoStarted) return;
  _autoStarted = true;
  setTimeout(() => {
    try { QRScanner.start(); } catch (e) { console.log("autoStart error:", e); }
  }, 0);
};
window.addEventListener('DOMContentLoaded', autoStartOnce, { once: true });
// --- end auto start block ---

// === Manual key dialog handlers ===
const dlg       = document.getElementById('manualDlg');
const input     = document.getElementById('manualInput');
const errEl     = document.getElementById('manualErr');
const manualBtn = document.getElementById('manualBtn');
const okBtn     = document.getElementById('manualOk');
const cancelBtn = document.getElementById('manualCancel');

manualBtn.addEventListener('click', () => {
  try { QRScanner.stop(); } catch(_) {}
  errEl.textContent = '';
  input.value = '';
  dlg.showModal();
  input.focus();
  dlg.classList.add('blink');
});

okBtn.addEventListener('click', (e) => {
  e.preventDefault();
    const v = input.value.trim();
    if (v === f_key128){
      sessionStorage.setItem("ts", String(Date.now()));
      sessionStorage.setItem("tokey", f_tokey);
      location.replace(admin_URL_128);
    } else if (v === f_key64){
      sessionStorage.setItem("ts", String(Date.now()));
      sessionStorage.setItem("tokey", f_tokey);
      location.replace(admin_URL_64);
    } else {
    if (errEl) errEl.textContent = '金鑰不正確';
    input.value = '';
    input.focus();
  }
});

cancelBtn.addEventListener('click', () => {
  dlg.classList.remove('blink');
  dlg.close();
  if (errEl) errEl.textContent = '';
  if (input) input.value = '';
  try { QRScanner.start(); } catch(_) {}
});

input?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); okBtn?.click(); }
});
// === end manual key dialog ===
</script>
</body>
</html>
